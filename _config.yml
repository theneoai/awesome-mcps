title: Awesome MCPs
description: Curated collection of Model Context Protocol servers and tools
url: https://theneoai.github.io
baseurl: /awesome-mcps

theme: minima

markdown: kramdown
kramdown:
  input: GFM

include:
  - assets
  - configs

header_pages:
  - README.md
  - README.zh.md
  - INSTALL.md

exclude:
  - node_modules/
  - vendor/
  - .git/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - docs/
