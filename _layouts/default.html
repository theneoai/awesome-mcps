<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --dark: #0a0a0f;
            --dark-card: #1a1a25;
            --dark-border: #2a2a3a;
            --gray: #6b7280;
            --light: #f3f4f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--light);
            line-height: 1.6;
            min-height: 100vh;
        }
        .top-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 2rem; background: var(--dark-card); border-bottom: 1px solid var(--dark-border);
        }
        .nav-logo { font-weight: 700; color: #fff; text-decoration: none; font-size: 1.25rem; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { color: var(--gray); text-decoration: none; transition: color 0.2s; }
        .nav-links a:hover { color: var(--primary-light); }
        .nav-links a.active { color: var(--primary-light); }
        footer {
            text-align: center; padding: 2rem; border-top: 1px solid var(--dark-border);
            color: var(--gray); font-size: 0.875rem;
        }
        footer a { color: var(--primary-light); text-decoration: none; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="./" class="nav-logo">Awesome MCPs</a>
        <div class="nav-links">
            <a href="./">Search</a>
            <a href="./configs.html">Configs</a>
            <a href="./categories.html">Categories</a>
            <a href="https://github.com/theneoai/awesome-mcps" target="_blank">GitHub</a>
        </div>
    </nav>

    {{ content }}

    <footer>
        <p>Awesome MCPs by <a href="https://github.com/theneoai">neo.ai</a> &bull; MIT License</p>
    </footer>
</body>
</html>
