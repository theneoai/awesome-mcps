---
layout: default
title: MCP Configs | 配置文件
---

<div class="configs-page">
    <h1>MCP Configs | MCP 配置文件</h1>
    <p class="subtitle">直接复制到你的 claude_desktop_config.json</p>

    <div class="configs-grid">
        {% for config in site.static_files %}
            {% if config.path contains 'configs/' and config.extname == '.json' %}
            <div class="config-card">
                <div class="config-name">{{ config.basename }}</div>
                <a href="{{ config.path }}" class="config-link">View Config</a>
            </div>
            {% endif %}
        {% endfor %}
    </div>
</div>

<style>
.configs-page { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.configs-page h1 { color: #fff; margin-bottom: 0.5rem; }
.subtitle { color: #6b7280; margin-bottom: 2rem; }
.configs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
.config-card { background: #1a1a25; border: 1px solid #2a2a3a; border-radius: 12px; padding: 1rem; }
.config-name { font-weight: 600; color: #fff; margin-bottom: 0.5rem; }
.config-link { color: #818cf8; text-decoration: none; font-size: 0.875rem; }
.config-link:hover { text-decoration: underline; }
</style>
